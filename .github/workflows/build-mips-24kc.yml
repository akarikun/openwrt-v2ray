name: Build mips_24kc

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      ARCH: mips_24kc
      SDK_URL_PATH: https://downloads.openwrt.org/releases/23.05.5/targets/ath79/generic
      SDK_NAME: -sdk-ath79-generic_
      CACHE_DIR: ~/cache

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SDK Cache
        uses: actions/cache@v4
        with:
          path: ~/cache
          key: ${{ runner.os }}-openwrt-v2ray-${{ env.ARCH }}-sdk-23.05.5-v1-${{ github.run_number }}
          restore-keys: |
            ${{ runner.os }}-openwrt-v2ray-${{ env.ARCH }}-sdk-23.05.5-v1-

      - name: Setup CCache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-openwrt-v2ray-${{ env.ARCH }}-ccache-23.05.5-v1-${{ github.run_number }}
          restore-keys: |
            ${{ runner.os }}-openwrt-v2ray-${{ env.ARCH }}-ccache-23.05.5-v1-

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -yq \
            build-essential \
            clang \
            flex \
            bison \
            g++ \
            gawk \
            gcc-multilib \
            g++-multilib \
            gettext \
            git \
            libncurses5-dev \
            libssl-dev \
            python3 \
            python3-distutils \
            rsync \
            unzip \
            wget \
            curl \
            file \
            zstd \
            xsltproc \
            ca-certificates

      - name: Prepare For Build
        run: |
          sdk_home="$(mktemp -d)"
          mkdir -p ~/.ccache
          ln -sf ~/.ccache "$sdk_home/.ccache"

          echo "SDK_HOME=$sdk_home" >> "$GITHUB_ENV"
          echo "CONFIG_CCACHE=y" >> "$GITHUB_ENV"

          echo "SDK_HOME=$sdk_home"

      - name: Build package
        run: |
          set -o pipefail
          sh compile.sh 2>&1 | tee build.log

      - name: Collect IPK
        if: always()
        run: |
          mkdir -p artifacts

          echo "Find all IPK:"
          find . "$SDK_HOME" -name "*.ipk" -type f -print || true

          echo "Copy v2ray IPK:"
          find . "$SDK_HOME" -name "v2ray*.ipk" -type f -exec cp -v {} artifacts/ \; || true

          if [ -f build.log ]; then
            cp -v build.log artifacts/
          fi

          echo "Artifacts:"
          ls -lh artifacts || true

          if ! ls artifacts/*.ipk >/dev/null 2>&1; then
            echo "ERROR: No v2ray IPK files found."
            echo "Last 200 lines of build.log:"
            tail -n 200 build.log || true
            exit 1
          fi

      - name: Upload IPK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v2ray-core-mips_24kc
          path: artifacts/*
          retention-days: 7
